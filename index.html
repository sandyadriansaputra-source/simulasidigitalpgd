<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>Pegadaian Pro Sidodadi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --p-green: #006a4e;
            --p-green-dark: #004d39;
            --p-gold: #c5a059;
            --p-gold-light: #dfc48b;
            --p-gold-glow: rgba(197, 160, 89, 0.2);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #f8fafc;
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #1e293b;
        }

        .header-premium {
            background: linear-gradient(135deg, #006a4e 0%, #004d39 100%);
            position: relative;
            overflow: hidden;
            border-bottom: 4px solid var(--p-gold);
        }

        .card-glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(226, 232, 240, 0.8);
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .card-section-title {
            font-size: 10px;
            font-weight: 800;
            color: var(--p-green);
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .input-group-modern {
            display: flex;
            align-items: center;
            background: #f1f5f9;
            border-radius: 10px;
            border: 1.5px solid transparent;
            transition: all 0.2s ease;
        }

        .input-group-modern:focus-within {
            border-color: var(--p-gold);
            background: #fff;
            box-shadow: 0 0 0 3px var(--p-gold-glow);
        }

        .input-field {
            width: 100%;
            padding: 8px 12px;
            background: transparent;
            border: none;
            outline: none;
            font-weight: 600;
            color: #334155;
            font-size: 13px;
        }

        .btn-inline-save {
            padding: 6px 12px;
            color: var(--p-green);
            transition: all 0.2s;
            font-size: 12px;
        }

        .btn-inline-save:active {
            transform: scale(0.9);
        }

        .btn-primary-gradient {
            background: linear-gradient(135deg, var(--p-green) 0%, var(--p-green-dark) 100%);
            box-shadow: 0 8px 16px -4px rgba(0, 106, 78, 0.3);
        }

        .btn-primary-gradient:active {
            transform: translateY(1px);
        }
    </style>
</head>

<body class="pb-10">

    <div id="loader" class="fixed inset-0 bg-white z-[1000] flex flex-col items-center justify-center">
        <div class="w-10 h-10 border-4 border-slate-200 border-t-emerald-600 border-r-amber-400 rounded-full animate-spin"></div>
        <p class="mt-4 text-[9px] font-bold text-slate-400 tracking-widest uppercase">Memuat Data...</p>
    </div>

    <div class="header-premium p-4 pb-6 text-white rounded-b-[24px] shadow-lg">
        <div class="flex items-center justify-center gap-3">
            <img src="https://monev.pegadaian.co.id/userdata/profile_site/5662a273c270a215cdc46900d8a882f280e84b32c3f02.png" alt="Logo" class="h-8 brightness-0 invert">
            <div class="h-6 w-[1.5px] bg-amber-400/50"></div>
            <div>
                <h1 class="text-sm font-black italic leading-none text-white">PEGADAIAN PRO</h1>
                <p class="text-[7px] font-bold tracking-widest text-amber-200 uppercase mt-0.5">Sidodadi Simulation</p>
            </div>
        </div>
    </div>

    <div class="px-4 -mt-3 space-y-3">
        
        <div class="card-glass p-4">
            <div class="card-section-title mb-2">
                <i class="fa-solid fa-layer-group text-amber-500"></i>
                <span>Produk</span>
            </div>
            <select id="pilihanProduk" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl font-bold text-slate-700 text-xs outline-none focus:border-emerald-500 transition-all">
                <option value="KCA">GADAI KCA</option>
                <option value="FLEXI">GADAI FLEXI</option>
                <option value="KRASIDA">GADAI KRASIDA</option>
            </select>
        </div>

        <div class="card-glass p-4">
            <div class="flex justify-between items-center mb-3">
                <div class="card-section-title">
                    <i class="fa-solid fa-chart-line text-emerald-600"></i>
                    <span>Parameter</span>
                </div>
                <button onclick="handleReset('resetAdmin', this)" class="text-[9px] font-bold text-red-500 bg-red-50 px-2 py-1 rounded-md">
                    RESET
                </button>
            </div>
            <div class="grid grid-cols-2 gap-2">
                <div class="space-y-1">
                    <label class="text-[9px] font-bold text-slate-400 ml-1">STL</label>
                    <div class="input-group-modern">
                        <input type="text" id="stl" class="input-field" placeholder="0">
                        <button onclick="saveCell('stl', 'stl')" class="btn-inline-save"><i class="fa-solid fa-save"></i></button>
                    </div>
                </div>
                <div class="space-y-1">
                    <label class="text-[9px] font-bold text-slate-400 ml-1">HD RETAIL</label>
                    <div class="input-group-modern">
                        <input type="text" id="hd_retail" class="input-field" placeholder="0">
                        <button onclick="saveCell('hd_retail', 'hd_retail')" class="btn-inline-save"><i class="fa-solid fa-save"></i></button>
                    </div>
                </div>
                <div class="col-span-2 space-y-1">
                    <label class="text-[9px] font-bold text-slate-400 ml-1 uppercase">Permintaan UP</label>
                    <div class="input-group-modern !bg-emerald-50">
                        <input type="text" id="up" class="input-field font-bold text-emerald-800" placeholder="0">
                        <button onclick="saveCell('up', 'up_permintaan')" class="btn-inline-save !text-emerald-700"><i class="fa-solid fa-check"></i></button>
                    </div>
                </div>
            </div>
        </div>

        <div class="card-glass p-4">
            <div class="flex justify-between items-center mb-3">
                <div class="card-section-title">
                    <i class="fa-solid fa-gem text-amber-500"></i>
                    <span>Jaminan</span>
                </div>
                <button onclick="handleReset('resetJaminan', this)" class="text-[9px] font-bold text-red-500 bg-red-50 px-2 py-1 rounded-md">
                    HAPUS
                </button>
            </div>
            
            <div class="space-y-2">
                <div class="grid grid-cols-2 gap-2 bg-slate-50/50 p-2 rounded-lg border border-slate-100">
                    <div class="input-group-modern !bg-white">
                        <input type="text" id="b1" class="input-field !py-1.5" placeholder="Brt 1">
                        <button onclick="saveCell('b1', 'berat1')" class="btn-inline-save !py-1"><i class="fa-solid fa-save"></i></button>
                    </div>
                    <div class="input-group-modern !bg-white">
                        <input type="text" id="k1" class="input-field !py-1.5" placeholder="Krt 1">
                        <button onclick="saveCell('k1', 'karat1')" class="btn-inline-save !py-1"><i class="fa-solid fa-save"></i></button>
                    </div>
                </div>
                
                <div class="grid grid-cols-2 gap-2 bg-slate-50/50 p-2 rounded-lg border border-slate-100">
                    <div class="input-group-modern !bg-white">
                        <input type="text" id="b2" class="input-field !py-1.5" placeholder="Brt 2">
                        <button onclick="saveCell('b2', 'berat2')" class="btn-inline-save !py-1"><i class="fa-solid fa-save"></i></button>
                    </div>
                    <div class="input-group-modern !bg-white">
                        <input type="text" id="k2" class="input-field !py-1.5" placeholder="Krt 2">
                        <button onclick="saveCell('k2', 'karat2')" class="btn-inline-save !py-1"><i class="fa-solid fa-save"></i></button>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-2 bg-slate-50/50 p-2 rounded-lg border border-slate-100">
                    <div class="input-group-modern !bg-white">
                        <input type="text" id="b3" class="input-field !py-1.5" placeholder="Brt 3">
                        <button onclick="saveCell('b3', 'berat3')" class="btn-inline-save !py-1"><i class="fa-solid fa-save"></i></button>
                    </div>
                    <div class="input-group-modern !bg-white">
                        <input type="text" id="k3" class="input-field !py-1.5" placeholder="Krt 3">
                        <button onclick="saveCell('k3', 'karat3')" class="btn-inline-save !py-1"><i class="fa-solid fa-save"></i></button>
                    </div>
                </div>
            </div>
        </div>

        <button onclick="prosesSimulasi()" id="btnSubmit" class="btn-primary-gradient w-full py-4 rounded-xl text-white font-black text-xs tracking-widest uppercase flex items-center justify-center gap-2">
            <i class="fa-solid fa-calculator"></i>
            HITUNG ESTIMASI
        </button>

    </div>

    <div id="modalResult" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[999] items-center justify-center p-6">
        <div class="bg-white w-full max-w-xs rounded-2xl overflow-hidden shadow-2xl">
            <div class="bg-emerald-900 p-4 text-center">
                <h3 class="text-white font-black text-[10px] tracking-widest">HASIL ESTIMASI</h3>
                <p id="labelHasil" class="text-amber-400 text-[9px] font-bold mt-1 uppercase"></p>
            </div>
            <div class="p-5">
                <div class="bg-amber-50 p-3 text-center rounded-xl mb-3 border border-amber-100">
                    <p class="text-[8px] text-amber-700 font-bold uppercase tracking-wider">Harga Retail</p>
                    <h2 id="valRetail" class="text-lg font-black text-amber-900 mt-1">Rp 0</h2>
                </div>
                
                <div class="bg-slate-50 p-4 text-center rounded-xl mb-4 border border-slate-100">
                    <p class="text-[9px] text-slate-400 font-bold uppercase">Uang Pinjaman</p>
                    <h2 id="valPinjaman" class="text-2xl font-black text-emerald-800 mt-1">Rp 0</h2>
                </div>
                <div id="tableKrasida" class="hidden border rounded-lg overflow-hidden">
                    <table class="w-full text-[10px]">
                        <thead class="bg-slate-100 text-emerald-900">
                            <tr><th class="p-2">Tenor</th><th class="p-2">Angsuran</th></tr>
                        </thead>
                        <tbody id="tbodyKrasida" class="text-center font-bold"></tbody>
                    </table>
                </div>
                <button onclick="closePopup()" class="w-full mt-4 py-3 bg-slate-800 text-white rounded-lg font-bold text-[10px]">TUTUP</button>
            </div>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyTRbvRFQWATCJlG7SmaIyI6-p35KP_lf8Ty8EW6fsekb5qvhvkSfuokf1VTK4Ihn7r/exec";

        window.onload = async () => {
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('portrait').catch(function(error) {
                    console.log("Orientation lock diabaikan.");
                });
            }

            const loader = document.getElementById('loader');
            try {
                const response = await fetch(WEB_APP_URL);
                const data = await response.json();
                if (data.stl) document.getElementById('stl').value = formatVal(data.stl);
                if (data.hd_retail) document.getElementById('hd_retail').value = formatVal(data.hd_retail);
                if (data.up) document.getElementById('up').value = formatVal(data.up);
                ['b1','k1','b2','k2','b3','k3'].forEach(id => {
                    if(data[id]) document.getElementById(id).value = formatVal(data[id]);
                });
            } catch (e) { console.log("Gagal load."); }
            finally { loader.style.display = 'none'; }
        };

        function formatVal(v) {
            let s = v.toString().replace('.', ',');
            let p = s.split(',');
            p[0] = p[0].replace(/\B(?=(\d{3})+(?!\d))/g, ".");
            return p.join(',');
        }

        function formatID(i) {
            let v = i.value.replace(/[^0-9,]/g, '');
            let p = v.split(',');
            p[0] = p[0].replace(/\B(?=(\d{3})+(?!\d))/g, ".");
            i.value = p.join(',');
        }

        function parseID(s) { return parseFloat(s.replace(/\./g, '').replace(',', '.')) || 0; }

        ['stl', 'hd_retail', 'up', 'b1', 'k1', 'b2', 'k2', 'b3', 'k3'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.addEventListener('input', function () { formatID(this); });
        });

        async function saveCell(id, key) {
            const el = document.getElementById(id).parentElement;
            el.style.borderColor = "#fbbf24";
            const payload = {}; payload[key] = parseID(document.getElementById(id).value);
            try {
                await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify(payload) });
                el.style.borderColor = "#10b981";
                setTimeout(() => el.style.borderColor = "transparent", 1000);
            } catch (e) { alert("Gagal!"); }
        }

        async function handleReset(action, btn) {
            btn.innerHTML = '...'; 
            try {
                await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: action }) });
                location.reload();
            } catch (e) { alert("Gagal!"); }
        }

        async function prosesSimulasi() {
            const btn = document.getElementById('btnSubmit');
            const prod = document.getElementById('pilihanProduk').value;
            btn.innerHTML = 'MENGHITUNG...';
            const payload = {
                stl: parseID(document.getElementById('stl').value),
                hd_retail: parseID(document.getElementById('hd_retail').value),
                up_permintaan: parseID(document.getElementById('up').value),
                berat1: parseID(document.getElementById('b1').value), karat1: parseID(document.getElementById('k1').value),
                berat2: parseID(document.getElementById('b2').value), karat2: parseID(document.getElementById('k2').value),
                berat3: parseID(document.getElementById('b3').value), karat3: parseID(document.getElementById('k3').value)
            };
            try {
                const res = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify(payload) });
                const data = await res.json();
                document.getElementById('labelHasil').innerText = "PRODUK " + prod;
                const tbBody = document.getElementById('tbodyKrasida');
                const tbSec = document.getElementById('tableKrasida');
                tbSec.classList.add('hidden');
                
                // Menampilkan Kolom F2 (Harga Retail)
                document.getElementById('valRetail').innerText = data.f2 || "Rp 0";
                
                if (prod === 'KCA') document.getElementById('valPinjaman').innerText = data.kca;
                if (prod === 'FLEXI') document.getElementById('valPinjaman').innerText = data.flexi;
                if (prod === 'KRASIDA') {
                    document.getElementById('valPinjaman').innerText = data.krasida;
                    tbBody.innerHTML = "";
                    data.tabelKrasida.slice(1).forEach(row => {
                        tbBody.innerHTML += `<tr class="border-b"><td class="p-2">${row[0]}</td><td class="p-2 text-red-600">${row[1]}</td></tr>`;
                    });
                    tbSec.classList.remove('hidden');
                }
                document.getElementById('modalResult').style.display = 'flex';
            } catch (e) { alert("Gagal!"); }
            finally { btn.innerHTML = '<i class="fa-solid fa-calculator"></i> HITUNG ESTIMASI'; }
        }

        function closePopup() { document.getElementById('modalResult').style.display = 'none'; }
    </script>
</body>

</html>
